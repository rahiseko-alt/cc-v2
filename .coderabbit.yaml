# CodeRabbit 設定（tier-1＝基準変更の「第2の目」＝別ベンダ bot の挙動定義）
#
# この案件での役割：docs/roadmap.html の nodes(criteria/verify＝合格ライン)を変える PR を、
# 作業した本人以外の立場で敵対レビューし、問題があれば正式な "Request changes"(CHANGES_REQUESTED) を出す。
# basis-gate.sh は「coderabbitai[bot] が現HEADをレビュー済み かつ CHANGES_REQUESTED 無し」で tier-1 を緑にする。
#
# ⚠️ このファイルは審判集合(tier-2)。request_changes_workflow を false 等に緩めると tier-1 が骨抜きになるため、
#    変更にはマスター承認が要る（basis-gate.sh / AGENTS.md / docs/basis-gate.md で tier-2 として凍結済み）。

reviews:
  # 問題検出時に GitHub の formal review "Request changes"(CHANGES_REQUESTED) を submit する。
  # 既定は false（COMMENT のみ）＝これを true にしないと反証が出ず、どんな悪い基準変更もゲート素通りになる。
  request_changes_workflow: true
  auto_review:
    enabled: true      # PR の open / push(synchronize) ごとに自動レビュー
    drafts: false      # draft はレビューしない
    base_branches:
      - ".*"           # base が main 以外の PR も対象化（既定はデフォルトブランチのみ）
