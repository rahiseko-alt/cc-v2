name: roadmap-required

# ロードマップ必須ゲート。全PRは docs/roadmap.html を必ず更新する。
# handoff（meta.handoff）を roadmap に同梱したので、これで「引継ぎが本編に必ず乗る」を機械保証する。
# ②今回トラブル・③次回=meta.next は毎セッション必ず書けるため diff 0 はあり得ない＝例外なし。
# ※ 機械強制は branch protection で status context `roadmap-required` を必須にして初めて有効。

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  require-roadmap:
    name: PRにroadmap更新があるか（例外なし）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: docs/roadmap.html の差分を確認
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          if git diff --name-only "$BASE...$HEAD" | grep -qx 'docs/roadmap.html'; then
            echo "OK: docs/roadmap.html に差分あり。"
          else
            echo "NG: このPRは docs/roadmap.html を更新していません。"
            echo "毎セッション、最低でも meta.handoff（①今回実施 ②今回トラブル ③次回=meta.next）を更新すること。例外なし。"
            exit 1
          fi
