name: auto-merge

# 日常のマージから人間を外す仕組み（3層の tier-0／承認済み tier-1 を自動マージ）。
# 判定は「機械と門が全部緑か」の1点：
#   - CI(check runs: quality / smoke / roadmap-required 等) が全て success
#   - commit status(basis-gate / prod-smoke) が combined success
#     ＝ basis-gate が tier-2(人間待ち) や tier-1(bot反証/待ち) を failure にしている間は自動マージされない。
#   - PR が同一リポ発・非draft・mergeable・`hold` ラベル無し
# これらが揃った main 向け PR を squash マージする。人間はボタンを押さない。
#
# ※ private 無料プランでも動くよう、branch protection の auto-merge 機能ではなく
#   トークンによる明示マージで実装する（GITHUB_TOKEN が主体）。

on:
  check_suite:
    types: [completed]
  status: {}
  pull_request_review:
    types: [submitted, dismissed, edited]
  pull_request:
    types: [labeled, unlabeled, ready_for_review, reopened]

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read

concurrency:
  group: auto-merge
  cancel-in-progress: false

jobs:
  evaluate:
    name: 緑の main 向け PR を自動マージ
    runs-on: ubuntu-latest
    steps:
      - name: 評価してマージ
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # main 向けの open PR を列挙（同一リポ発のみ）。
          prs="$(gh api "repos/$REPO/pulls?state=open&base=main&per_page=50" \
            --jq '.[] | select(.head.repo.full_name==.base.repo.full_name) | .number')"

          if [ -z "$prs" ]; then
            echo "対象の open PR なし。"
            exit 0
          fi

          for pr in $prs; do
            echo "=== PR #$pr を評価 ==="
            meta="$(gh api "repos/$REPO/pulls/$pr")"
            draft="$(jq -r '.draft' <<<"$meta")"
            mergeable="$(jq -r '.mergeable' <<<"$meta")"
            sha="$(jq -r '.head.sha' <<<"$meta")"
            labels="$(jq -r '[.labels[].name] | join(",")' <<<"$meta")"

            if [ "$draft" = "true" ]; then echo "skip: draft"; continue; fi
            if grep -qw 'hold' <<<"${labels//,/ }"; then echo "skip: hold ラベル"; continue; fi

            # 1) commit status（basis-gate / prod-smoke 等）の combined が success か
            cstate="$(gh api "repos/$REPO/commits/$sha/status" --jq '.state')"
            if [ "$cstate" != "success" ]; then
              echo "skip: commit status = $cstate（門 or prod-smoke が未緑）"; continue
            fi

            # 2) check runs（CI: quality / smoke / roadmap-required 等）が全て success/skipped/neutral か。
            #    自分自身(auto-merge)の check は除外して自己デッドロックを防ぐ。
            runs="$(gh api "repos/$REPO/commits/$sha/check-runs?per_page=100" \
              --jq '[.check_runs[] | select((.name|test("auto-merge"))|not)]')"
            total="$(jq 'length' <<<"$runs")"
            bad="$(jq '[.[] | select(.conclusion!="success" and .conclusion!="skipped" and .conclusion!="neutral")] | length' <<<"$runs")"
            if [ "$total" -eq 0 ]; then echo "skip: check runs がまだ無い"; continue; fi
            if [ "$bad" -ne 0 ]; then echo "skip: 未成功の check runs が $bad 件"; continue; fi

            # 3) mergeable（null は GitHub が計算中 → 見送り、次イベントで再評価）
            if [ "$mergeable" != "true" ]; then echo "skip: mergeable=$mergeable"; continue; fi

            echo "全緑 → PR #$pr を squash マージ"
            gh pr merge "$pr" --squash --delete-branch --repo "$REPO" \
              && echo "merged #$pr" \
              || echo "merge 失敗（競合/権限/タイミング）。次イベントで再評価。"
          done
