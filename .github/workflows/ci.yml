name: CI

# 機械の審判（machine judge）。ロードマップ G-1 系の evidence は
# このワークフローの run URL / commit SHA を指す（AI の自己申告を証拠にしない）。
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality:
    name: typecheck / lint / test / build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Lint
        run: pnpm -r lint

      - name: Test
        run: pnpm -r test

      - name: Build
        run: pnpm -r build
