name: basis-gate

# 基準凍結の門番（2AI承認ゲート）。
# criteria/verify・規律に触るPR（docs/roadmap.html / AGENTS.md 系）は、
# 別系統2AI(Claude/Codex)の両承認が現HEADに揃うまで basis-gate を緑にしない。
# 承認が後から付くので pull_request だけでなく pull_request_review でも再評価する。
# ※ 機械強制は branch protection で status context `basis-gate` を必須にして初めて有効。

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted, dismissed, edited]

permissions:
  contents: read
  pull-requests: read
  statuses: write

jobs:
  gate:
    name: 2AI承認ゲート (基準変更PR)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 判定して commit status を記録
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: bash .github/scripts/basis-gate.sh
