name: basis-gate

# 基準凍結の門番（3層ルーティング）。詳細は docs/basis-gate.md。
# PR が触るファイルを tier-0/1/2 に分類し、必要な承認だけを現HEADに要求する：
#   tier-0=機械だけ即success / tier-1=別ベンダbot反証なし / tier-2=人間(審判集合・prod昇格)承認。
# 承認/レビューが後から付くので pull_request だけでなく pull_request_review でも再評価する。
# ※ 機械強制は branch protection で status context `basis-gate` を必須にして初めて有効。

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted, dismissed, edited]

permissions:
  contents: read
  pull-requests: read
  statuses: write

jobs:
  gate:
    name: 基準凍結の門番 (3層ルーティング)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 判定して commit status を記録
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: bash .github/scripts/basis-gate.sh
